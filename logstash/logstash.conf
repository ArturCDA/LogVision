input {
  jdbc {
    jdbc_driver_library => "/home/devpedro/.m2/repository/org/postgresql/postgresql/42.7.11/postgresql-42.7.11.jar"
    jdbc_driver_class => "org.postgresql.Driver"

    jdbc_connection_string => "jdbc:postgresql://localhost:5432/logdb"
    jdbc_user => "postgres"
    jdbc_password => "ph12345"

    statement => "SELECT * FROM logs WHERE id > :sql_last_value"

    use_column_value => true
    tracking_column => "id"

    last_run_metadata_path => "/home/devpedro/Documentos/faculdade/projetos/periodo4/bancoDeDados2/nota2/LogVision/logstash/.last_run"

    clean_run => false

    schedule => "*/10 * * * * *"
  }
}
filter {
  mutate {
    remove_field => ["@version", "unix_ts_in_secs"]
    uppercase => ["level"]
  }

  if [level] == "INFO" {
    mutate { add_field => { "css_class" => "text-bg-primary" } }
  } else if [level] == "WARN" {
    mutate { add_field => { "css_class" => "text-bg-warning" } }
  } else if [level] == "ERROR" {
    mutate { add_field => { "css_class" => "text-bg-danger" } }
  } else if [level] == "FATAL" {
    mutate { add_field => { "css_class" => "text-bg-dark border-danger" } }
  } else {
    mutate { add_field => { "css_class" => "text-bg-secondary" } }
  }

  if [message] =~ /(?i)(banco|sql|conexão|tabela|postgres)/ {
    mutate { add_field => { "categoria" => "Banco de Dados" } }
  } else if [message] =~ /(?i)(usuário|login|senha|token|autenticação|credenciais)/ {
    mutate { add_field => { "categoria" => "Segurança & Acesso" } }
  } else if [message] =~ /(?i)(memória|cpu|disco|porta)/ {
    mutate { add_field => { "categoria" => "Infraestrutura" } }
  } else {
    mutate { add_field => { "categoria" => "Aplicação" } }
  }

  mutate {
    gsub => [
      "message", "([a-zA-Z0-9_.-])[a-zA-Z0-9_.-]+(@[a-zA-Z0-9_.-]+)", "\1***\2"
    ]
  }
}
output {
  file {
    path => "/home/devpedro/Documentos/faculdade/projetos/periodo4/bancoDeDados2/nota2/LogVision/logs_processados.json"
    codec => "json_lines"
  }
  
  stdout {
    codec => rubydebug
  }
}